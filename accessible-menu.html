<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>크게보기 - 메뉴 도우미</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

  :root {
    --bg: #111111;
    --text: #FFEE00;
    --sub: #FFCC00;
    --border: #FFEE00;
    --accent: #FFEE00;
    --accent2: #FF9944;
    --card: #1E1E1E;
    --card-border: #FFEE00;
    --btn-bg: #FFEE00;
    --btn-text: #111111;
    --fav: #FF9944;
    --tag-bg: #2A2800;
    --tag-text: #FFEE00;
    --input-bg: #2A2800;
    --input-border: #FFEE00;
    --shadow: rgba(255,238,0,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 500px;
    margin: 0 auto;
    transition: background 0.25s, color 0.25s;
    overflow-x: hidden;
    position: relative;
  }

  /* ─── SCREEN MANAGEMENT ─── */
  .screen { display: none; flex-direction: column; min-height: 100vh; }
  .screen.active { display: flex; }

  /* ─── HEADER BAR ─── */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px 20px 12px;
    border-bottom: 3px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
    min-height: 70px;
  }
  #screen-results .top-bar,
  #screen-detail .top-bar,
  #screen-camera .top-bar,
  #screen-fav .top-bar {
    justify-content: space-between;
  }
  .back-btn {
    background: none;
    border: 4px solid var(--border);
    color: var(--text);
    font-size: 30px;
    font-weight: 900;
    padding: 14px 24px;
    border-radius: 16px;
    cursor: pointer;
    min-width: 130px;
    min-height: 72px;
    display: flex; align-items: center; gap: 8px;
    transition: background 0.15s;
  }
  .back-btn:active { background: var(--card); }

  .theme-btn {
    background: var(--btn-bg);
    color: var(--btn-text);
    border: none;
    border-radius: 50%;
    width: 58px; height: 58px;
    font-size: 28px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 3px 10px var(--shadow);
    transition: transform 0.15s;
  }
  .theme-btn:active { transform: scale(0.92); }

  .top-title {
    font-size: 26px;
    font-weight: 900;
    color: var(--text);
    flex: 1;
    text-align: center;
  }
  .top-title.home-title {
    font-size: 44px;
    font-weight: 900;
    letter-spacing: -1.5px;
    flex: none;
    text-align: center;
    width: 100%;
  }

  /* ─── HOME: SEARCH ZONE (top 40%) ─── */
  .home-search-zone {
    padding: 24px 20px 20px;
    border-bottom: 4px solid var(--border);
    background: var(--bg);
    min-height: 40vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 14px;
    box-sizing: border-box;
    width: 100%;
    overflow: hidden;
  }
  .home-search-label {
    font-size: 22px;
    font-weight: 900;
    color: var(--sub);
    letter-spacing: -0.5px;
  }
  .search-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
    width: 100%;
    box-sizing: border-box;
    min-width: 0;
  }
  .search-input {
    flex: 1;
    min-width: 0;
    font-size: 28px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 18px 20px;
    border: 6px solid var(--input-border);
    border-radius: 16px;
    background: var(--input-bg);
    color: var(--text);
    outline: none;
    min-height: 82px;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.3);
  }
  .search-input {
    background: #2A2800;
    color: var(--text);
  }
  .search-input::placeholder { color: #888855; }

  .search-input:focus { border-color: #FFEE00; box-shadow: 0 0 0 4px rgba(255,238,0,0.3); }
  .mic-btn {
    background: var(--accent);
    color: #111111;
    border: none;
    border-radius: 16px;
    width: 76px;
    min-height: 76px;
    font-size: 34px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 16px var(--shadow);
    transition: transform 0.15s;
  }
  .mic-btn:active { transform: scale(0.92); }
  .mic-btn.listening { background: var(--accent2); animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100%{ box-shadow: 0 0 0 0 rgba(204,51,0,0.5); } 50%{ box-shadow: 0 0 0 14px rgba(204,51,0,0); } }
  .search-hint {
    font-size: 17px;
    color: var(--sub);
    font-weight: 400;
    padding: 0 4px;
  }
  .search-execute-btn {
    background: #FF6600;
    color: #111111;
    border: none;
    border-radius: 16px;
    padding: 18px 20px;
    font-size: 34px;
    font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    width: 100%;
    min-height: 86px;
    letter-spacing: -0.5px;
    box-shadow: 0 5px 20px rgba(255,102,0,0.45);
    transition: transform 0.15s, opacity 0.15s;
  }
  .search-execute-btn:active { transform: scale(0.97); opacity: 0.85; }

  /* ─── HOME: MENU ZONE (bottom 60%) ─── */
  .home-menu-zone {
    flex: 1;
    padding: 20px 20px 30px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }
  .home-menu-zone-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--sub);
  }
  .home-cat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .home-cat-grid-2col {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .home-cat-grid-2col .home-cat-btn {
    width: 100%;
    flex-direction: row;
    justify-content: flex-start;
    padding: 28px 32px;
    min-height: 110px;
    gap: 24px;
    font-size: 40px;
  }
  .home-cat-grid-2col .home-cat-btn .cat-icon svg {
    width: 60px;
    height: 60px;
  }
  .home-cat-btn {
    background: var(--card);
    border: 4px solid var(--border);
    color: var(--text);
    border-radius: 20px;
    padding: 26px 14px;
    font-size: 34px;
    font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 0 4px 16px var(--shadow);
    min-height: 140px;
    justify-content: center;
  }
  .home-cat-btn:active { transform: scale(0.95); }
  .home-cat-btn .cat-icon { line-height: 1; display: flex; align-items: center; justify-content: center; }
  .home-cat-btn.fav-btn {
    grid-column: 1 / -1;
    background: var(--fav);
    color: #111111;
    border-color: var(--fav);
    font-size: 34px;
    min-height: 90px;
    border-radius: 20px;
  }

  .camera-shortcut-btn {
    background: var(--accent);
    color: #111111;
    border: none;
    border-radius: 20px;
    padding: 20px 14px;
    font-size: 30px;
    font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    box-shadow: 0 4px 16px var(--shadow);
    min-height: 90px;
    transition: transform 0.15s;
  }
  .camera-shortcut-btn:active { transform: scale(0.97); }

  /* ─── RESULTS SCREEN ─── */
  .results-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 30px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .result-card {
    background: var(--card);
    border: 4px solid var(--card-border);
    border-radius: 20px;
    padding: 22px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    box-shadow: 0 4px 14px var(--shadow);
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
    min-height: 110px;
  }
  .result-card:active { transform: scale(0.98); border-color: var(--accent); }
  .result-card-info { flex: 1; min-width: 0; }
  .result-card-name {
    font-size: 30px;
    font-weight: 900;
    line-height: 1.25;
    word-break: keep-all;
    margin-bottom: 4px;
  }
  .result-card-tag {
    display: inline-block;
    font-size: 17px;
    font-weight: 700;
    background: var(--tag-bg);
    color: var(--tag-text);
    border-radius: 8px;
    padding: 3px 10px;
    margin-top: 4px;
  }
  .tts-btn {
    background: var(--btn-bg);
    color: var(--btn-text);
    border: none;
    border-radius: 16px;
    width: 90px;
    min-height: 90px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    flex-shrink: 0;
    transition: transform 0.15s;
    padding: 6px 4px;
    font-family: 'Noto Sans KR', sans-serif;
    line-height: 1.15;
  }
  .tts-btn .tts-line1 {
    font-size: 26px;
    font-weight: 900;
    display: block;
    width: 100%;
    text-align: center;
  }
  .tts-btn .tts-line2 {
    font-size: 26px;
    font-weight: 900;
    display: block;
    width: 100%;
    text-align: center;
  }
  .tts-btn:active { transform: scale(0.88); }
  .tts-btn.speaking { background: var(--accent2); }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    font-size: 26px;
    font-weight: 700;
    color: var(--sub);
    line-height: 1.8;
  }

  /* Sub detail screen */
  .detail-header {
    padding: 20px 16px 10px;
    border-bottom: 3px solid var(--card-border);
  }
  .detail-brand-name {
    font-size: 36px;
    font-weight: 900;
    margin-bottom: 6px;
  }
  .detail-brand-sub {
    font-size: 18px;
    color: var(--sub);
    font-weight: 400;
  }
  .fav-toggle-btn {
    background: none;
    border: 3px solid var(--fav);
    color: var(--fav);
    font-size: 20px;
    font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 10px 18px;
    border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    margin-top: 12px;
    min-height: 52px;
    transition: background 0.15s;
  }
  .fav-toggle-btn.active { color: #111111; background: var(--fav); color: #fff; }

  /* ─── CAMERA SCREEN ─── */
  .camera-view {
    flex: 1;
    position: relative;
    background: #000;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
  }
  #cameraVideo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: filter 0.3s;
  }
  .camera-no-support {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: #FFEE00;
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    padding: 40px;
  }
  .camera-no-support .big-icon { font-size: 72px; }

  /* capture flash */
  .flash-overlay {
    position: absolute;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 10;
    transition: opacity 0.1s;
  }
  .flash-overlay.flash { opacity: 1; }

  /* zoom indicator */
  .zoom-indicator {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: #FFEE00;
    font-size: 22px;
    font-weight: 900;
    padding: 8px 20px;
    border-radius: 30px;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .zoom-indicator.show { opacity: 1; }

  /* contrast indicator */
  .contrast-indicator {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: #FFEE00;
    font-size: 18px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 30px;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .contrast-indicator.show { opacity: 1; }

  /* camera controls */
  .camera-controls {
    background: var(--bg);
    padding: 18px 16px 32px;
    border-top: 4px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .camera-zoom-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .zoom-btn {
    background: var(--btn-bg);
    color: var(--btn-text);
    border: none;
    border-radius: 16px;
    width: 90px; height: 90px;
    font-size: 48px;
    font-weight: 900;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px var(--shadow);
    transition: transform 0.1s;
    flex-shrink: 0;
  }
  .zoom-btn:active { transform: scale(0.9); }
  .zoom-label {
    font-size: 20px;
    font-weight: 700;
    color: var(--sub);
    text-align: center;
    flex: 1;
    line-height: 1.4;
  }
  .capture-row {
    display: flex;
    align-items: center;
    gap: 12px;
    justify-content: center;
  }
  .capture-btn {
    background: var(--accent2);
    color: #fff;
    border: none;
    border-radius: 20px;
    height: 90px;
    width: 60%;
    font-size: 26px;
    font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    gap: 10px;
    box-shadow: 0 5px 20px var(--shadow);
    transition: transform 0.1s;
  }
  .capture-btn:active { transform: scale(0.95); }
  .contrast-btn {
    background: #333;
    color: #FFEE00;
    border: 3px solid #FFEE00;
    border-radius: 16px;
    height: 90px;
    flex: 1;
    font-size: 16px;
    font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px;
    line-height: 1.3;
    text-align: center;
    padding: 8px;
    transition: background 0.15s, transform 0.1s;
  }
  .contrast-btn:active { transform: scale(0.94); }
  .contrast-btn.active-contrast { background: #FFEE00; color: #111; }
  .contrast-btn .c-icon { font-size: 28px; }

  /* captured image overlay */
  .captured-overlay {
    position: absolute;
    inset: 0;
    z-index: 20;
    background: #000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 20px;
  }
  .captured-overlay.show { display: flex; }
  #capturedCanvas { max-width: 100%; border-radius: 12px; }
  .close-capture-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 16px 40px;
    font-size: 24px;
    font-weight: 900;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
  }

  /* ─── BOTTOM NAV ─── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 500px;
    background: #1A1A1A;
    border-top: 3px solid #FFEE00;
    display: flex;
    z-index: 200;
    height: 88px;
  }
  .nav-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    background: none;
    border: none;
    color: #888866;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 17px;
    font-weight: 700;
    padding: 8px 4px;
    transition: color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-tab:active { background: rgba(255,238,0,0.1); }
  .nav-tab.active {
    color: #FFEE00;
  }
  .nav-tab svg { transition: stroke 0.15s; }
  .nav-tab.active svg { stroke: #FFEE00; }
  .nav-tab:not(.active) svg { stroke: #888866; }
  /* 모든 screen에 하단 네비 여백 */
  .screen { padding-bottom: 88px; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(0,0,0,0.85);
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    padding: 14px 28px;
    border-radius: 50px;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 4px; }
</style>
</head>
<body>

<!-- ════════════════════════════════════════════
     SCREEN 1: HOME
════════════════════════════════════════════ -->
<div id="screen-home" class="screen active">

  <!-- Top bar -->
  <div class="top-bar">
    <span class="top-title home-title">크게 크게</span>
  </div>

  <!-- Search zone (top ~40%) -->
  <div class="home-search-zone">
    <div class="search-row">
      <input
        class="search-input"
        id="homeSearchInput"
        type="search"
        placeholder="초성으로 검색 가능"
        inputmode="search"
        autocomplete="off"
      >
      <button class="mic-btn" id="micBtn" aria-label="음성 검색">🎤</button>
    </div>
    <button class="search-execute-btn" id="homeSearchBtn">검색하기</button>
  </div>

  <!-- Menu zone (bottom ~60%) -->
  <div class="home-menu-zone">
    <div class="home-cat-grid">
      <button class="home-cat-btn" data-cat="카페" onclick="goCat('카페')">
        <span class="cat-icon">
          <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="6" y="14" width="30" height="24" rx="4" stroke="currentColor" stroke-width="3.5" fill="none"/>
            <path d="M36 20 C40 20 44 22 44 27 C44 32 40 34 36 34" stroke="currentColor" stroke-width="3.5" fill="none" stroke-linecap="round"/>
            <path d="M12 38 C12 41 40 41 40 38" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
          </svg>
        </span>
        <span>카페</span>
      </button>
      <button class="home-cat-btn" data-cat="식당" onclick="goCat('식당')">
        <span class="cat-icon">
          <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
            <line x1="16" y1="8" x2="16" y2="44" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
            <path d="M10 8 L10 22 C10 26 22 26 22 22 L22 8" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" fill="none"/>
            <line x1="36" y1="8" x2="36" y2="44" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
            <path d="M29 8 C29 8 29 20 36 20 C43 20 43 8 43 8" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" fill="none"/>
          </svg>
        </span>
        <span>식당</span>
      </button>
    </div>

  </div>

</div>


<!-- ════════════════════════════════════════════
     SCREEN 2: RESULTS
════════════════════════════════════════════ -->
<div id="screen-results" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goBack()">◀ 뒤로</button>
    <span class="top-title" id="resultsTitle">검색 결과</span>
    <div style="width:80px"></div>
  </div>
  <div class="results-list" id="resultsList"></div>
</div>


<!-- ════════════════════════════════════════════
     SCREEN 3: BRAND DETAIL
════════════════════════════════════════════ -->
<div id="screen-detail" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goBack()">◀ 뒤로</button>
    <span class="top-title" id="detailTitle">메뉴</span>
    <div style="width:80px"></div>
  </div>
  <div class="detail-header" id="detailHeader"></div>
  <div class="results-list" id="detailList"></div>
</div>


<!-- ════════════════════════════════════════════
     SCREEN 4: CAMERA
════════════════════════════════════════════ -->
<div id="screen-camera" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goBack()">◀ 뒤로</button>
    <span class="top-title">🔬 돋보기</span>

let screenHistory = ['home'];
let favorites = JSON.parse(localStorage.getItem('fav') || '[]');
let cameraStream = null;
let zoomScale = 1;
let contrastOn = false;
let zoomTimer = null;
let contrastTimer = null;
let currentSpeaking = null;

//   NAVIGATION
// ═══════════════════════════════════════════
// 네비 탭 루트 (홈/돋보기/즐겨찾기) - 스택 초기화
function navTo(name) {
  vib();
  // 탭 활성화 표시
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const activeTab = document.getElementById('nav-' + name);
  if (activeTab) activeTab.classList.add('active');

  // 스크린 전환
  screenHistory = [name === 'home' ? 'home' : name];
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

  if (name === 'camera') {
    document.getElementById('screen-camera').classList.add('active');
    startCamera();
  } else if (name === 'fav') {
    document.getElementById('screen-fav').classList.add('active');
    renderFavScreen();
    stopCamera();
  } else {
    document.getElementById('screen-home').classList.add('active');
    stopCamera();
  }
}

function gotoScreen(name) {
  vib();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  screenHistory.push(name);
  if (name === 'camera') startCamera();
  else stopCamera();
}

function goBack() {
  vib();
  if (screenHistory.length <= 1) {
    // 루트 탭으로 복귀
    const root = screenHistory[0] || 'home';
    navTo(root === 'camera' ? 'camera' : root === 'fav' ? 'fav' : 'home');
    return;
  }
  screenHistory.pop();
  const prev = screenHistory[screenHistory.length - 1];
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + prev).classList.add('active');
  if (prev !== 'camera') stopCamera();
}

function renderFavScreen() {
  const all = [...BRANDS.카페.map(b => ({...b, cat:'카페'})), ...BRANDS.식당.map(b => ({...b, cat:'식당'}))];
  const items = all.filter(b => favorites.includes(b.name));
  const list = document.getElementById('favList');
  if (items.length === 0) {
    list.innerHTML = '<div class="no-results">아직 즐겨찾기가 없습니다.<br><br>브랜드 메뉴에서<br>즐겨찾기를 추가해 보세요.</div>';
    return;
  }
  list.innerHTML = items.map(brand => `
    <div class="result-card" onclick="openBrand('${brand.name}','${brand.cat}')">
      <div class="result-card-info">
        <div class="result-card-name">${brand.name}</div>
        <span class="result-card-tag">${brand.cat === '카페' ? '카페' : '식당'}</span>
      </div>
      <button class="tts-btn" onclick="event.stopPropagation(); speak('${brand.name}')" aria-label="${brand.name} 읽기"><span class="tts-line1">소리</span><span class="tts-line2">듣기</span></button>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════
//   VIBRATION
// ═══════════════════════════════════════════
function vib(pattern = [30]) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

// ═══════════════════════════════════════════
//   TOAST
// ═══════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════
//   THEME
// ═══════════════════════════════════════════
// 테마 고정: 다크 모드 전용

// ═══════════════════════════════════════════
//   CHOSUNG MAP
// ═══════════════════════════════════════════
const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function getChosung(str) {
  return [...str].map(c => {
    const code = c.charCodeAt(0) - 0xAC00;
    if (code < 0 || code > 11171) return c;
    return CHO[Math.floor(code / 28 / 21)];
  }).join('');
}

// ═══════════════════════════════════════════
//   SEARCH
// ═══════════════════════════════════════════
function doSearch(query) {
  const q = query.trim();
  if (!q) { showToast('검색어를 입력해 주세요'); return; }
  vib();

  // category check
  if (q === '카페' || q === '식당' || q === '즐겨찾기') { goCat(q); return; }

  const results = [];
  const qLower = q.toLowerCase();
  const allBrands = [...BRANDS.카페.map(b => ({...b, cat:'카페'})), ...BRANDS.식당.map(b => ({...b, cat:'식당'}))];

  // 쿼리 초성 추출 (사용자가 한글 초성만 입력했는지 검사)
  const qChosung = getChosung(q);
  const isChosungQuery = [...q].every(ch => 'ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ'.includes(ch));

  allBrands.forEach(brand => {
    const nameMatch = brand.name.includes(q);
    // 초성 검색: 브랜드명의 초성이 쿼리를 포함하는지 (양방향 매칭)
    const brandChosung = getChosung(brand.name);
    const chosungMatch = brand.chosung.includes(q) || brandChosung.includes(q) || (isChosungQuery && brandChosung.startsWith(qChosung));
    const menuMatch = brand.menus.some(m => m.includes(q) || getChosung(m).includes(q));
    if (nameMatch || chosungMatch || menuMatch) results.push(brand);
  });

  renderResults(results, `"${q}" 검색 결과`);
  gotoScreen('results');
}

document.getElementById('homeSearchBtn').addEventListener('click', () => {
  doSearch(document.getElementById('homeSearchInput').value);
});
document.getElementById('homeSearchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch(e.target.value);
});

// ═══════════════════════════════════════════
//   CATEGORY
// ═══════════════════════════════════════════
function goCat(cat) {
  vib();
  let items = [];
  let title = '';

  if (cat === '즐겨찾기') {
    const all = [...BRANDS.카페.map(b => ({...b, cat:'카페'})), ...BRANDS.식당.map(b => ({...b, cat:'식당'}))];
    items = all.filter(b => favorites.includes(b.name));
    title = '⭐ 즐겨찾기';
    if (items.length === 0) {
      renderResults([], '⭐ 즐겨찾기');
      gotoScreen('results');
      return;
    }
  } else {
    items = (BRANDS[cat] || []).map(b => ({...b, cat}));
    title = cat === '카페' ? '카페' : '식당';
  }

  renderResults(items, title);
  gotoScreen('results');
}

// ═══════════════════════════════════════════
//   RENDER RESULTS (brand list)
// ═══════════════════════════════════════════
function renderResults(items, title) {
  document.getElementById('resultsTitle').textContent = title;
  const list = document.getElementById('resultsList');

  if (items.length === 0) {
    list.innerHTML = `<div class="no-results">😥 결과가 없습니다.<br><br>다른 검색어로<br>다시 시도해 보세요.</div>`;
    return;
  }

  list.innerHTML = items.map(brand => `
    <div class="result-card" onclick="openBrand('${brand.name}','${brand.cat}')">
      <div class="result-card-info">
        <div class="result-card-name">${brand.name}</div>
        ${favorites.includes(brand.name) ? '<span class="result-card-tag">⭐ 즐겨찾기</span>' : ''}
      </div>
      <button class="tts-btn" onclick="event.stopPropagation(); speak('${brand.name}')" aria-label="${brand.name} 읽기"><span class="tts-line1">소리</span><span class="tts-line2">듣기</span></button>
    </div>
  `).join('');
}

// ═══════════════════════════════════════════
//   BRAND DETAIL (menu list)
// ═══════════════════════════════════════════
function openBrand(name, cat) {
  vib();
  const brand = BRANDS[cat].find(b => b.name === name);
  if (!brand) return;

  document.getElementById('detailTitle').textContent = name;

  const isFav = favorites.includes(name);
  document.getElementById('detailHeader').innerHTML = `
    <div class="detail-brand-name">${brand.name}</div>
    <div class="detail-brand-sub">메뉴 ${brand.menus.length}종</div>
    <button class="fav-toggle-btn ${isFav ? 'active' : ''}" id="favToggleBtn" onclick="toggleFav('${name}')">
      ${isFav ? '⭐ 즐겨찾기 해제' : '☆ 즐겨찾기 추가'}
    </button>
  `;

  document.getElementById('detailList').innerHTML = brand.menus.map((menu, i) => `
    <div class="result-card">
      <div class="result-card-info">
        <div class="result-card-name">${menu}</div>
        <span class="result-card-tag">${i + 1}번째 메뉴</span>
      </div>
      <button class="tts-btn" onclick="speak('${menu}')" aria-label="${menu} 읽기"><span class="tts-line1">소리</span><span class="tts-line2">듣기</span></button>
    </div>
  `).join('');

  gotoScreen('detail');
}

function toggleFav(name) {
  vib([30, 20, 30]);
  const idx = favorites.indexOf(name);
  if (idx === -1) {
    favorites.push(name);
    showToast(`⭐ ${name} 즐겨찾기 추가!`);
  } else {
    favorites.splice(idx, 1);
    showToast(`${name} 즐겨찾기 해제`);
  }
  localStorage.setItem('fav', JSON.stringify(favorites));
  const btn = document.getElementById('favToggleBtn');
  if (btn) {
    btn.className = 'fav-toggle-btn' + (favorites.includes(name) ? ' active' : '');
    btn.textContent = favorites.includes(name) ? '⭐ 즐겨찾기 해제' : '☆ 즐겨찾기 추가';
  }
}

// ═══════════════════════════════════════════
//   TTS
// ═══════════════════════════════════════════
function speak(text) {
  vib();
  if (!('speechSynthesis' in window)) { showToast('음성 기능 미지원'); return; }
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'ko-KR';
  utter.rate = 0.85;
  utter.pitch = 1.0;
  window.speechSynthesis.speak(utter);
  showToast(`"${text}" 읽는 중...`);
}

// ═══════════════════════════════════════════
//   VOICE SEARCH (Web Speech API)
// ═══════════════════════════════════════════
const micBtn = document.getElementById('micBtn');
let recognition = null;

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ko-KR';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => { micBtn.classList.add('listening'); showToast('🎤 말씀해 주세요...'); };
  recognition.onend = () => { micBtn.classList.remove('listening'); };
  recognition.onerror = () => { micBtn.classList.remove('listening'); showToast('음성 인식 실패'); };
  recognition.onresult = (e) => {
    const t = e.results[0][0].transcript;
    document.getElementById('homeSearchInput').value = t;
    doSearch(t);
  };

  micBtn.addEventListener('click', () => {
    vib();
    if (micBtn.classList.contains('listening')) { recognition.stop(); return; }
    recognition.start();
  });
} else {
  micBtn.addEventListener('click', () => { vib(); showToast('이 브라우저는 음성 인식 미지원'); });
}

// ═══════════════════════════════════════════
//   CAMERA
// ═══════════════════════════════════════════
async function startCamera() {
  const video = document.getElementById('cameraVideo');
  const noSupport = document.getElementById('cameraNoSupport');

  // HTTPS check
  if (location.protocol === 'http:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    video.style.display = 'none';
    noSupport.style.display = 'flex';
    noSupport.innerHTML = '<span class="big-icon">🔒</span><span>보안 연결(HTTPS)이 필요합니다.<br>HTTPS 주소로 접속해 주세요.</span>';
    showToast('⚠️ HTTPS 연결이 필요합니다');
    return;
  }

  // API support check
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    video.style.display = 'none';
    noSupport.style.display = 'flex';
    noSupport.innerHTML = '<span class="big-icon">📷</span><span>이 브라우저는 카메라를<br>지원하지 않습니다.</span>';
    return;
  }

  // Show loading toast immediately
  showToast('📷 카메라를 준비 중입니다...');
  vib([30]);

  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = cameraStream;
    video.style.display = 'block';
    noSupport.style.display = 'none';
    applyZoom();
    showToast('✅ 카메라 준비 완료!');
  } catch (err) {
    video.style.display = 'none';
    noSupport.style.display = 'flex';
    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
      noSupport.innerHTML = '<span class="big-icon">🚫</span><span>카메라 권한이 거부되어 있습니다.<br><br>브라우저 주소창 옆 🔒 아이콘을 눌러<br><strong>카메라 권한을 허용</strong>해 주세요.</span>';
      showCameraPermissionModal();
    } else if (err.name === 'NotFoundError') {
      noSupport.innerHTML = '<span class="big-icon">📷</span><span>카메라를 찾을 수 없습니다.<br>기기에 카메라가 연결되어 있는지<br>확인해 주세요.</span>';
      showToast('카메라를 찾을 수 없습니다');
    } else {
      noSupport.innerHTML = '<span class="big-icon">⚠️</span><span>카메라를 사용할 수 없습니다.<br>잠시 후 다시 시도해 주세요.</span>';
      showToast('카메라 오류: ' + (err.message || err.name));
    }
  }
}

function showCameraPermissionModal() {
  let modal = document.getElementById('cameraPermModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'cameraPermModal';
    modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;';
    modal.innerHTML = `
      <div style="background:var(--bg);color:var(--text);border-radius:20px;padding:32px 24px;max-width:400px;width:100%;text-align:center;border:4px solid var(--border);">
        <div style="font-size:60px;margin-bottom:16px;">🚫</div>
        <div style="font-size:28px;font-weight:900;margin-bottom:16px;line-height:1.4;">카메라 권한이<br>거부되어 있습니다</div>
        <div style="font-size:20px;color:var(--sub);line-height:1.7;margin-bottom:28px;">브라우저 주소창 옆<br>🔒 아이콘 → <strong>카메라 허용</strong><br>으로 설정 후 다시 눌러주세요.</div>
        <button onclick="document.getElementById('cameraPermModal').remove()" style="background:var(--btn-bg);color:var(--btn-text);border:none;border-radius:14px;padding:18px 40px;font-size:24px;font-weight:900;font-family:inherit;cursor:pointer;width:100%;">확인</button>
      </div>`;
    document.body.appendChild(modal);
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
  }
}

function stopCamera() {
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
    cameraStream = null;
  }
  const video = document.getElementById('cameraVideo');
  video.srcObject = null;
  zoomScale = 1;
  contrastOn = false;
  updateCameraUI();
}

async function applyZoom() {
  const video = document.getElementById('cameraVideo');
  // 네이티브 카메라 zoom 우선 (선명도 유지)
  if (cameraStream) {
    const track = cameraStream.getVideoTracks()[0];
    if (track) {
      const caps = track.getCapabilities ? track.getCapabilities() : {};
      if (caps.zoom) {
        try {
          const min = caps.zoom.min || 1;
          const max = caps.zoom.max || 4;
          const nativeZoom = Math.min(max, Math.max(min, zoomScale));
          await track.applyConstraints({ advanced: [{ zoom: nativeZoom }] });
          video.style.transform = '';  // CSS 확대 해제
          return;
        } catch(e) { /* 네이티브 미지원 → CSS fallback */ }
      }
    }
  }
  // CSS fallback (네이티브 미지원 시)
  video.style.transform = `scale(${zoomScale})`;
  video.style.transformOrigin = 'center center';
}

function updateCameraUI() {
  const val = zoomScale.toFixed(1).replace('.0', '') + '×';
  document.getElementById('zoomValue').textContent = val;

  const ind = document.getElementById('zoomIndicator');
  ind.textContent = '확대 ' + val;
  ind.classList.add('show');
  clearTimeout(zoomTimer);
  zoomTimer = setTimeout(() => ind.classList.remove('show'), 1800);
}

document.getElementById('zoomInBtn').addEventListener('click', () => {
  vib();
  if (zoomScale < 4) { zoomScale = Math.min(4, parseFloat((zoomScale + 0.5).toFixed(1))); }
  applyZoom(); updateCameraUI();
});

document.getElementById('zoomOutBtn').addEventListener('click', () => {
  vib();
  if (zoomScale > 1) { zoomScale = Math.max(1, parseFloat((zoomScale - 0.5).toFixed(1))); }
  applyZoom(); updateCameraUI();
});

document.getElementById('contrastBtn').addEventListener('click', () => {
  vib([30, 20, 30]);
  contrastOn = !contrastOn;
  const video = document.getElementById('cameraVideo');
  video.style.filter = contrastOn ? 'contrast(2.5) brightness(1.1)' : '';
  document.getElementById('contrastBtn').classList.toggle('active-contrast', contrastOn);

  const ind = document.getElementById('contrastIndicator');
  ind.textContent = contrastOn ? '대비 강화 ON 🎨' : '대비 강화 OFF';
  ind.classList.add('show');
  clearTimeout(contrastTimer);
  contrastTimer = setTimeout(() => ind.classList.remove('show'), 1800);
  showToast(contrastOn ? '🎨 대비 강화 켜짐' : '대비 강화 꺼짐');
});

document.getElementById('captureBtn').addEventListener('click', () => {
  vib([50, 30, 50]);
  const video = document.getElementById('cameraVideo');
  if (!cameraStream || video.readyState < 2) {
    showToast('카메라가 준비 중입니다');
    return;
  }

  // Flash
  const flash = document.getElementById('flashOverlay');
  flash.classList.add('flash');
  setTimeout(() => flash.classList.remove('flash'), 200);

  // Draw to canvas
  const canvas = document.getElementById('capturedCanvas');
  canvas.width = video.videoWidth || 640;
  canvas.height = video.videoHeight || 480;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  if (contrastOn) {
    ctx.filter = 'contrast(2.5) brightness(1.1)';
    ctx.drawImage(canvas, 0, 0);
  }

  // Scale canvas for display
  canvas.style.maxWidth = '100%';
  canvas.style.maxHeight = '55vh';
  canvas.style.borderRadius = '16px';

  document.getElementById('capturedOverlay').classList.add('show');
  showToast('📸 캡처 완료!');
});

function closeCaptured() {
  vib();
  document.getElementById('capturedOverlay').classList.remove('show');
}

// ═══════════════════════════════════════════
//   All buttons get vibration via delegation
// ═══════════════════════════════════════════
document.addEventListener('click', (e) => {
  if (e.target.closest('button') || e.target.closest('.result-card')) {
    if (navigator.vibrate) navigator.vibrate(25);
  }
}, { passive: true });
</script>
